# fleet-medic gated apply: the ONLY workflow that may ever see OPS_RW_SSH_KEY
# (ADR-0004 Option A; issue #13). The L2 gate is the GitHub Environment
# `box-mutations` required reviewer: a human approves THIS run after reading
# the dry-run plan, and the confirm_token binds that approval to that exact
# plan — the write tool re-verifies fresh box state and refuses on drift or
# expiry (write_plan.py), so approval is never a blank check.
#
# Both #13 pairing decisions are now resolved: the confirm-token TTL is tuned
# to 30 min (write_plan.py, vs approval latency) and the box host key is
# pinned below (no more per-run TOFU). Until #6 lands, dispatch is manual: run
# a write tool's dry-run over MCP, paste the confirm_token here, approve the
# environment gate. #6's Agent Loop later produces the plan + token as an
# artifact instead of a human pasting it.
name: apply

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Write tool to apply (must match the approved dry-run plan)"
        required: true
        type: choice
        options:
          - prune_images
          - rotate_logs
      service:
        description: "Service name (rotate_logs only)"
        required: false
        type: string
        default: ""
      confirm_token:
        description: "confirm_token from the dry-run plan being approved"
        required: true
        type: string

# Two applies must never overlap each other (or a second queued approval).
concurrency:
  group: box-mutations
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    # The confirm token expires 30 min after the dry-run (write_plan.py,
    # tuned from 15 for approval latency). If the environment reviewer
    # approves later than that, apply fails closed — re-run dry-run for a
    # fresh token and re-approve; drift re-verification, not the TTL, is the
    # primary staleness guard.
    environment: box-mutations
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Sync dependencies
        run: uv sync --locked

      - name: Write ops-rw identity file
        env:
          # Through env, not `${{ }}` inside the script body — the write
          # credential must never be textually substituted into shell source.
          OPS_RW_SSH_KEY: ${{ secrets.OPS_RW_SSH_KEY }}
        run: |
          install -m 600 /dev/null "$RUNNER_TEMP/ops-rw"
          printf '%s\n' "$OPS_RW_SSH_KEY" > "$RUNNER_TEMP/ops-rw"

      # Pin the box host key so this write path never trusts-on-first-use
      # (#13 PAIR / roadmap #8c). The runner's known_hosts starts empty, so
      # accept-new would TOFU every run; pre-writing the known-good key makes
      # accept-new verify against it and refuse a mismatched (MITM) host
      # instead. OPS_BOX_HOST_KEY is a repo *variable* (a public host key,
      # not a secret). Fail closed if it's unset — better to abort a write
      # run than to silently fall back to TOFU.
      - name: Pin box host key
        env:
          OPS_BOX_HOST_KEY: ${{ vars.OPS_BOX_HOST_KEY }}
        run: |
          if [ -z "$OPS_BOX_HOST_KEY" ]; then
            echo "OPS_BOX_HOST_KEY variable is not set — refusing to run apply without a pinned host key" >&2
            exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$OPS_BOX_HOST_KEY" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Apply approved plan
        env:
          OPS_BOX_HOST: ${{ secrets.OPS_BOX_HOST }}
          OPS_RW_SSH_KEY_PATH: ${{ runner.temp }}/ops-rw
          OPS_RW_SSH_USER: ops-rw
          APPLY_ACTION: ${{ inputs.action }}
          APPLY_SERVICE: ${{ inputs.service }}
          APPLY_CONFIRM_TOKEN: ${{ inputs.confirm_token }}
        run: uv run python -m ops_mcp.apply
