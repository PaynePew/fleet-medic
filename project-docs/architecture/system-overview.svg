<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 760" width="1160" height="760" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="fleet-medic system architecture: an off-box deterministic sensor wakes an LLM agent that diagnoses and remediates the VPS fleet through a risk-tiered tool belt behind a human gate">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c8f98"/>
    </marker>
  </defs>
  <style>
    .bg{fill:#f3f7f8;stroke:#d8e2e6}
    .h1{font-size:27px;font-weight:750;fill:#132027;letter-spacing:-.5px}
    .tag{font-size:13px;fill:#5c6f78}
    .band{fill:#e9f1f3;stroke:#d2dee2;stroke-width:1}
    .bandlabel{font-size:11px;font-weight:700;fill:#5f7580;letter-spacing:1.1px}
    .node{fill:#ffffff;stroke:#cdd9dd;stroke-width:1.4}
    .node.accent{stroke:#0c8a7c;stroke-width:2.2}
    .node.gate{fill:#eef8f6;stroke:#0c8a7c;stroke-width:1.8;stroke-dasharray:6 4}
    .ntitle{font-size:15px;font-weight:680;fill:#16232a;text-anchor:middle}
    .nsub{font-size:11px;fill:#61737b;text-anchor:middle}
    .flow{stroke:#7c8f98;stroke-width:1.7;fill:none}
    .verify{stroke:#0c8a7c;stroke-width:1.6;stroke-dasharray:2 4;fill:none}
    .lblbg{fill:#f3f7f8;stroke:#dbe4e8;stroke-width:.8}
    .lbl{font-size:10.5px;fill:#3f6b76;text-anchor:middle;font-weight:600}
    .lblv{font-size:10.5px;fill:#0a6a5f;text-anchor:middle;font-weight:600}
    .pill{fill:#eef8f6;stroke:#bfe2dc}
    .pilltext{font-size:11px;fill:#0a6a5f;text-anchor:middle;font-weight:600}
  </style>
  <rect x="1" y="1" width="1158" height="758" rx="18" class="bg"/>
  <text x="40" y="46" class="h1">fleet-medic</text><text x="40" y="70" class="tag">runtime ops agent · a deterministic sensor wakes a tool-using LLM that diagnoses, remediates behind a gate, and self-verifies</text><rect x="846.0" y="30" width="274.0" height="24" rx="12" class="pill"/><text x="983.0" y="46" class="pilltext">ADR-0001 · LLM never in the polling loop</text><rect x="627.0" y="30" width="211.0" height="24" rx="12" class="pill"/><text x="732.5" y="46" class="pilltext">ADR-0002 · agent lives off-box</text><rect x="370.20000000000005" y="30" width="248.79999999999998" height="24" rx="12" class="pill"/><text x="494.6" y="46" class="pilltext">ADR-0004 · two-phase + human L2 gate</text><rect x="40" y="96" width="1080" height="118" rx="16" class="band"/><text x="58" y="120" class="bandlabel">OFF-BOX CONTROL PLANE  ·  GitHub Actions (scheduled)</text><rect x="64" y="138" width="200" height="60" rx="10" class="node"/><text x="164.0" y="164.0" class="ntitle">Sensor</text><text x="164.0" y="182.0" class="nsub">df% / healthz / restarts · deterministic</text><rect x="300" y="138" width="150" height="60" rx="10" class="node"/><text x="375.0" y="164.0" class="ntitle">Tripwire</text><text x="375.0" y="182.0" class="nsub">df&gt;80 · hysteresis</text><rect x="486" y="138" width="210" height="60" rx="10" class="node"/><text x="591.0" y="164.0" class="ntitle">Anomaly Snapshot</text><text x="591.0" y="182.0" class="nsub">numbers + sanitized log tail</text><rect x="732" y="138" width="200" height="60" rx="10" class="node accent"/><text x="832.0" y="164.0" class="ntitle">Agent Loop</text><text x="832.0" y="182.0" class="nsub">tool-use · budget · run ledger</text><line x1="264" y1="168" x2="300" y2="168" class="flow" marker-end="url(#ah)"/><line x1="450" y1="168" x2="486" y2="168" class="flow" marker-end="url(#ah)"/><line x1="696" y1="168" x2="732" y2="168" class="flow" marker-end="url(#ah)"/><rect x="40" y="250" width="1080" height="132" rx="16" class="band"/><text x="58" y="274" class="bandlabel">TOOL BELT  ·  ops-mcp (FastMCP) — read / write / report, risk-tiered</text><rect x="64" y="300" width="300" height="64" rx="10" class="node"/><text x="214.0" y="328.0" class="ntitle">Read</text><text x="214.0" y="346.0" class="nsub">get_vitals · disk_breakdown · tail_logs …</text><rect x="400" y="300" width="300" height="64" rx="10" class="node accent"/><text x="550.0" y="328.0" class="ntitle">Write</text><text x="550.0" y="346.0" class="nsub">prune_images · rotate_logs (dry-run → confirm)</text><rect x="736" y="300" width="196" height="64" rx="10" class="node"/><text x="834.0" y="328.0" class="ntitle">Report</text><text x="834.0" y="346.0" class="nsub">file_incident_report</text><line x1="820" y1="198" x2="640" y2="250" class="flow" marker-end="url(#ah)"/><rect x="693.0" y="221" width="98.0" height="17" rx="4" class="lblbg"/><text x="742" y="233" class="lbl">calls the belt</text><rect x="400" y="418" width="300" height="52" rx="10" class="node gate"/><text x="550.0" y="440.0" class="ntitle">Human L2 gate</text><text x="550.0" y="458.0" class="nsub">GitHub Environment · required reviewer</text><line x1="560" y1="364" x2="560" y2="418" class="flow" marker-end="url(#ah)"/><rect x="538.0" y="381" width="44.0" height="17" rx="4" class="lblbg"/><text x="560" y="393" class="lbl">apply</text><rect x="40" y="560" width="700" height="160" rx="16" class="band"/><text x="58" y="584" class="bandlabel">THE BOX  ·  VPS fleet (data plane)</text><rect x="64" y="606" width="190" height="56" rx="10" class="node"/><text x="159.0" y="639.0" class="ntitle">edge (Caddy)</text><rect x="272" y="606" width="210" height="56" rx="10" class="node"/><text x="377.0" y="630.0" class="ntitle">tenant containers</text><text x="377.0" y="648.0" class="nsub">ask-wiki-rag · …</text><rect x="500" y="606" width="216" height="56" rx="10" class="node"/><text x="608.0" y="630.0" class="ntitle">docker engine</text><text x="608.0" y="648.0" class="nsub">images / logs / volumes</text><rect x="792" y="596" width="248" height="92" rx="10" class="node"/><text x="916.0" y="638.0" class="ntitle">GitHub Issues</text><text x="916.0" y="656.0" class="nsub">one incident → one issue · sanitized</text><line x1="150" y1="364" x2="150" y2="560" class="flow" marker-end="url(#ah)"/><rect x="53.0" y="457" width="194.0" height="17" rx="4" class="lblbg"/><text x="150" y="469" class="lbl">ops-ro · read (forced-command)</text><line x1="600" y1="470" x2="600" y2="560" class="flow" marker-end="url(#ah)" stroke-dasharray="5 5"/><rect x="527.0" y="505" width="146.0" height="17" rx="4" class="lblbg"/><text x="600" y="517" class="lbl">ops-rw · write (gated)</text><line x1="884" y1="364" x2="900" y2="596" class="flow" marker-end="url(#ah)"/><rect x="891.0" y="459" width="62.0" height="17" rx="4" class="lblbg"/><text x="922" y="471" class="lbl">gh issue</text><path d="M 40 640 C 10 640 10 168 62 168" class="verify" marker-end="url(#ah)" fill="none"/><rect x="4.0" y="391" width="140.0" height="17" rx="4" class="lblbg"/><text x="74" y="403" class="lblv">verify: re-run sensor</text>
</svg>
